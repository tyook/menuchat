services:
  - type: web
    name: menuchat-backend
    runtime: python
    region: ohio
    plan: free
    buildCommand: >-
      cd backend &&
      pip install poetry &&
      poetry config virtualenvs.create false &&
      poetry install --no-interaction --no-ansi --no-root --only main &&
      python manage.py collectstatic --noinput
    startCommand: >-
      cd backend &&
      python manage.py migrate --noinput &&
      daphne -b 0.0.0.0 -p $PORT config.asgi:application
    healthCheckPath: /api/health/
    autoDeploy: false
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        sync: false
      - key: POSTGRES_SSLMODE
        value: "require"
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CONNECT_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER_MONTHLY
        sync: false
      - key: STRIPE_PRICE_GROWTH_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_STARTER_ANNUAL
        sync: false
      - key: STRIPE_PRICE_GROWTH_ANNUAL
        sync: false
      - key: STRIPE_PRICE_PRO_ANNUAL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: POS_ENCRYPTION_KEY
        sync: false
      - key: POS_SQUARE_CLIENT_ID
        sync: false
      - key: POS_SQUARE_CLIENT_SECRET
        sync: false
      - key: POS_TOAST_CLIENT_ID
        sync: false
      - key: POS_TOAST_CLIENT_SECRET
        sync: false
      - key: POS_TOAST_RESTAURANT_GUID
        sync: false
      - key: TOAST_POS_ENABLED
        value: "False"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.sendgrid.net"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "apikey"
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@menuchat.app"
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false

  - type: worker
    name: menuchat-celery
    runtime: python
    region: ohio
    plan: free
    buildCommand: >-
      cd backend &&
      pip install poetry &&
      poetry config virtualenvs.create false &&
      poetry install --no-interaction --no-ansi --no-root --only main
    startCommand: >-
      cd backend &&
      celery -A config worker --loglevel=info
    autoDeploy: false
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          name: menuchat-backend
          type: web
          envVarKey: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "False"
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        sync: false
      - key: POSTGRES_SSLMODE
        value: "require"
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.sendgrid.net"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "apikey"
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@menuchat.app"
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
